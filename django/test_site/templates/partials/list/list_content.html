<table class="table">
  <thead>
    <tr>
      <th>Name</th>
      <th>Age</th>
      <th>Category</th>
    </tr>
  </thead>
  <tbody>
    {% for person in people %}
    <tr>
      <td>{{ person.name }}</td>
      <td>{{ person.age }}</td>
      <td>{{ person.category.name }}</td>
    </tr>
    {% empty %}
    <tr>
      <td class="no-data-message">
        No entries matched the filter settings.
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
